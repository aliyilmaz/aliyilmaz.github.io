
<br>
<form action="">
    
    <h5>INPUT TEXT</h5>
    <input type="text" id="coordinates">
    
    <br>
    
    <h5>TEXTAREA</h5>
    <textarea id="coordinates"></textarea>
    
    <br>
    
    <h5>SPAN</h5>
    <span id="coordinates"></span>
    
    <br>
    
    <h5>i</h5>
    <i id="coordinates"></i>
    
    <br>
    
    <h5>CHECKBOX</h5>
    <input type="checkbox" id="coordinates">
    <label for="coordinates"> I have a bike</label>
    
    <br>

    <h5>OPTION</h5>
    <select>
        <option id="coordinates">My Coordinate</option>
        <option>Nothing</option>
    </select>
    
    <br>

    <h5>MULTI OPTION</h5>
    <select name="fruit" multiple>
        <option value ="none">Nothing</option>
        <option value ="guava" id="coordinates">Guava</option>
        <option value ="lychee">Lychee</option>
        <option value ="papaya">Papaya</option>
        <option value ="watermelon">Watermelon</option>
    </select> 

</form>
<script>
    

    function getLocation() {
        let = elements = document.querySelectorAll("#coordinates");
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(redirectToPosition);
        } else { 
            console.log("Geolocation is not supported by this browser.");
            elements.forEach(function(element) {
                element.value = null;
            });
        }
    }

    function redirectToPosition(position) {
        let elements = document.querySelectorAll("#coordinates");
        let coordinates = position.coords.latitude+','+position.coords.longitude;
        if(elements.length >= 1){

            elements.forEach(function(element) {
                if(element.value === undefined){
                    element.textContent = coordinates;
                } else {
                    element.value = coordinates;
                }
            });
        } else {
            console.log("The item was not found.");
        }
    }
    
    getLocation();
</script>
